# Example Nav2 controller_server configuration using the DiffusionController
# (v0.1 skeleton). Drop-in replacement for the FollowPath controller plugin:
# only the controller_plugins block changes; progress/goal checkers stay
# standard Nav2. See docs/architecture.md section 3.2 (Mode A).
#
# This is a configuration example aligned with the Nav2 controller_server; tune
# values for your robot. For production, pair it with a fallback controller and
# the Collision Monitor (docs/safety.md sections 8.4 and 8.2).

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True

    FollowPath:
      plugin: "nav2_diffusion_controller::DiffusionController"
      lookahead_distance: 0.6
      desired_linear_speed: 0.3
      max_linear_speed: 0.5
      max_angular_speed: 1.0
      horizon: 2.0
      time_step: 0.1
      transform_tolerance: 0.1
      consider_unknown_lethal: false
