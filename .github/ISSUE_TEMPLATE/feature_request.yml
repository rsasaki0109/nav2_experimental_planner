name: Feature request
description: Propose a feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today? Who is affected (AMR / delivery / service)?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        How should it work? Which layer (model / safety / scorer / fallback /
        benchmark / integration)? Note if it needs a new plugin interface.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits the project scope (AMR / delivery / warehouse / service robots)
        - label: This is NOT manipulation / humanoid / full VLA (out of scope)
        - label: A large design change may need an RFC (rfcs/)
