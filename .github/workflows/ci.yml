name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build & test (${{ matrix.ros_distro }})
    runs-on: ubuntu-24.04
    # Run inside the official ROS image instead of building the ROS environment on
    # the host with setup-ros. The host setup intermittently failed to propagate
    # the ROS environment into colcon's per-package build subprocess, producing
    # non-deterministic "No module named ament_package" / "No rosidl_typesupport_c
    # found" errors on a different package each run. The prebuilt image ships a
    # stable, fully-sourced ROS, so those races disappear.
    container:
      image: ros:${{ matrix.ros_distro }}-ros-base
    strategy:
      fail-fast: false
      matrix:
        ros_distro: [jazzy]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The container runs as root; mark the checkout dir safe so the git
      # operations action-ros-ci performs do not trip "dubious ownership".
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      # action-ros-ci aggregates coverage with `colcon lcov-result` /
      # `colcon coveragepy-result` after the tests. The ros-base image lacks
      # those colcon extensions (the host setup-ros flow apt-installed them), so
      # add them here — otherwise the post-test coverage step fails even though
      # every test passed.
      - name: Install colcon coverage extensions
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            lcov python3-colcon-lcov-result python3-colcon-coveragepy-result

      # Builds the C++/msgs packages with colcon and runs colcon test, which
      # includes the ament lints (copyright, cpplint, uncrustify, lint_cmake,
      # xmllint) and the gtest suites. See docs/architecture.md section 12.4.
      - name: Build and test
        uses: ros-tooling/action-ros-ci@v0.4
        with:
          target-ros2-distro: ${{ matrix.ros_distro }}
          package-name: |
            nav2_diffusion_msgs
            nav2_diffusion_core
            nav2_diffusion_safety
            nav2_diffusion_controller
            nav2_diffusion_global_planner
            nav2_rrt_planner
            nav2_prm_planner
            nav2_dstar_lite_planner
            nav2_jps_planner
            nav2_lazy_theta_star_planner
            nav2_ara_star_planner
            nav2_visibility_graph_planner
            nav2_vfh_controller
            nav2_nd_controller
            nav2_planner_benchmarks
            nav2_diffusion_bringup
            nav2_diffusion_benchmarks
            nav2_diffusion_rviz_plugins
            nav2_diffusion_training
            nav2_diffusion_onnx
            nav2_diffusion_sim

      - name: Battle trace regression
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source ros_ws/install/setup.bash
          ros2 run nav2_planner_benchmarks battle_trace > /tmp/battle_fresh.json
          python3 tools/check_battle_trace.py \
            tools/nav2_planner_battle/battle_data.json /tmp/battle_fresh.json
