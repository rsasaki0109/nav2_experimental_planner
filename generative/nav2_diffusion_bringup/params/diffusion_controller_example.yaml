# Example Nav2 controller_server configuration using the DiffusionController
# (v0.1 skeleton). Drop-in replacement for the FollowPath controller plugin:
# only the controller_plugins block changes; progress/goal checkers stay
# standard Nav2. See docs/architecture.md section 3.2 (Mode A).
#
# This is a configuration example aligned with the Nav2 controller_server; tune
# values for your robot. For production, pair it with a fallback controller and
# the Collision Monitor (docs/safety.md sections 8.4 and 8.2).

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True

    FollowPath:
      plugin: "nav2_diffusion_controller::DiffusionController"
      lookahead_distance: 0.6
      desired_linear_speed: 0.3
      max_linear_speed: 0.5
      max_angular_speed: 1.0
      horizon: 2.0
      time_step: 0.1
      transform_tolerance: 0.1
      consider_unknown_lethal: false
      data_timeout: 0.5
      check_costmap_current: false
      num_candidates: 11
      score_progress_weight: 1.0
      score_smoothness_weight: 0.1
      # Optional: load a learned model via pluginlib instead of the built-in
      # FanRolloutModel (requires the plugin's package, e.g. nav2_diffusion_onnx).
      # model_plugin: "nav2_diffusion_onnx::OnnxTrajectoryModel"
      # model_path: "/path/to/model.onnx"
      # For a costmap-conditioned model (CostmapFlowPlanner), feed an egocentric
      # costmap patch of this side length (cells); must match the model's input:
      # costmap_patch_size: 32
      # Optional: delegate to a standard Nav2 controller when no safe generative
      # candidate exists (docs/safety.md 8.4). Empty disables it (stop instead).
      # fallback_controller_plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      # fallback:
      #   plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      #   desired_linear_vel: 0.26
