# Manifest for the curated generative LOCAL trajectory model: a costmap-conditioned
# Mode A (local controller) *transformer* set-prediction planner. Schema mirrors
# nav2_diffusion_models/manifests/example_diffusion_local.yaml
# (docs/architecture.md section 5.4). Reproduce the artifact with export.py.

model_name: diffusion_local_costmap_transformer_v0
model_family: transformer          # DETR-style set prediction (1 deterministic forward)

# Conditioning the model consumes (Mode A TrajectoryModel ONNX contract).
input_modalities:
  - local_costmap                  # egocentric 32x32 patch, normalized [0,1]
  - local_goal                     # carrot in the robot base frame
  - speed_limits                   # desired linear speed + max angular speed

output_type: trajectory_candidates # K base-frame SE(2) trajectories
frame_convention: base_link        # candidates are in the robot base frame
horizon: 1.0                       # seconds (10 steps x 0.1 s)
robot_kinematics: diff             # unicycle / differential drive

# I/O tensor contract (consumed by nav2_diffusion_onnx::OnnxTrajectoryModel):
#   context [1, 4] = [goal_x, goal_y, linear_speed, max_angular_speed]
#   costmap [1, 1, 32, 32]   egocentric; cropEgocentricPatch maps col 0 -> +y (left)
#   -> trajectories [1, 3, 10, 3]  (x, y, yaw) in the base frame
io_contract:
  inputs:
    context: [1, 4]
    costmap: [1, 1, 32, 32]
  output:
    trajectories: [1, 3, 10, 3]
  patch:
    size: 32
    note: "controller crops it via cropEgocentricPatch at the costmap resolution"

architecture:
  type: transformer_set_prediction
  note: >
    A strided conv tokenizes the 32x32 costmap patch into spatial tokens (with
    learned positional embeddings); a context token is prepended. K=3 learned query
    tokens cross-attend to that memory through 2 multi-head decoder blocks and each
    decodes a full SE(2) trajectory. Deterministic single forward pass; the three
    candidates differ because the queries differ (no sampling noise).

training_data:
  datasets:
    - name: synthetic_one_sided_obstacle
      source: sim                  # procedural: one-sided obstacle patch + veer-away expert
      fraction: 1.0
  robot_types:
    - generic_diff
  notes: >
    Fully synthetic. make_costmap_dataset() places a single obstacle band on the
    +y or -y side of the egocentric patch (varied row-band and column width) and
    labels the expert with a pure-pursuit arc toward a varied carrot (distance
    ~0.9-1.1 m, bearing +/-0.4 rad) plus a lateral bow away from the obstacle, with
    clear (no-obstacle) samples too. The carrot-pursuit arc is what gives the
    closed-loop goal tracking. NO real-robot or rosbag data.

# Behavioural check, not the full Nav2 benchmark suite (research placeholder).
benchmark_results:
  passed: true
  suite: behavioural (nav2_diffusion_onnx end-to-end costmap side-selection test)
  costmap_side_selection: true     # obstacle-left -> all candidates veer right, and vice versa
  clear_unbiased: true             # no obstacle -> candidates centred (straight ahead)
  offline_leaderboard: "2nd of 8 configurations in docs/model_comparison.md
    (success 1.00, zero collisions, single-step inference), just behind costmap-consistency"
  collision_count: 0               # deterministic safety gate (kinematic + footprint) gates output

limitations:
  - "Synthetic training data only — NOT validated on any real robot or rosbag."
  - "Trained on one-sided obstacles; a symmetric head-on block is ambiguous and not its competence."
  - "Short horizon (~1 s, ~0.3 m) and modest lateral veer (~0.2 m); relies on closed-loop replanning."
  - "Trained around goal_x=1.0, goal_y=0; far-off-axis carrots are out of distribution."
  - "Research / demonstration model. Do not deploy on hardware; the safety layer is the authority."

license:
