# Manifest for the first curated generative model in the zoo: a costmap-conditioned
# Mode B (global path) flow-matching planner. Schema mirrors
# nav2_diffusion_models/manifests/example_diffusion_local.yaml
# (docs/architecture.md section 5.4). Reproduce the artifact with export.py.

model_name: diffusion_global_costmap_flow_v0
model_family: flow                 # flow-matching (4 Euler steps)

# Conditioning the model consumes (Mode B PathModel ONNX contract).
input_modalities:
  - local_costmap                  # goal-aligned 24x24 patch, normalized [0,1]
  - local_goal                     # goal distance in the goal-aligned frame

output_type: path_candidates       # K start->goal global path proposals
frame_convention: map              # candidates rotated back into the map frame by the C++ backend
horizon: n/a                       # global path, not a timed trajectory
robot_kinematics: generic          # geometric paths; no kinodynamic assumptions

# I/O tensor contract (consumed by nav2_diffusion_onnx::OnnxPathModel):
#   context [1, 2] = [goal_distance, 0]
#   costmap [1, 1, 24, 24]   goal-aligned, row->forward x in [0, 6] m, col->lateral y in [-3, 3] m
#   -> paths [1, 5, 12, 2]   (x, y) in the goal-aligned frame; endpoints snapped to start/goal in C++
io_contract:
  inputs:
    context: [1, 2]
    costmap: [1, 1, 24, 24]
  output:
    paths: [1, 5, 12, 2]
  patch_window:
    forward_m: 6.0
    half_width_m: 3.0

runtime: onnx
precision: fp32

training_data:
  datasets:
    - name: synthetic_one_sided_obstacle
      source: sim                  # procedural: one-sided obstacle patch + analytic veer-to-open-side expert
      fraction: 1.0
  robot_types:
    - generic
  notes: >
    Fully synthetic. make_costmap_path_dataset() places a single obstacle band on
    the +y or -y half ahead and labels the expert path with a half-sine bow toward
    the open side. There is NO real-robot or rosbag data in this artifact.

# Behavioural check, not the full Nav2 benchmark suite (this model is a research
# placeholder, not a deployment model). See model_card.md for the numbers.
benchmark_results:
  passed: true
  suite: behavioural (nav2_diffusion_onnx end-to-end costmap side-selection test)
  costmap_side_selection: true     # obstacle-left -> ALL candidates veer right, and vice versa
  clear_unbiased: true             # no obstacle -> proposals centred on the straight line (no L/R bias)
  max_lateral_veer_m: 1.5          # approximate; sets the largest detour it can propose
  collision_count: 0               # deterministic validity layer gates all output regardless

limitations:
  - "Synthetic training data only — NOT validated on any real robot or rosbag."
  - "Lateral veer is limited to ~1.5 m; cannot propose large detours (e.g. a 2 m off-centre gap)."
  - "Single-mode avoidance: handles one-sided obstacles, not S-shaped / slalom routes."
  - "Weak / far / small obstacle signals may not flip every candidate; robust on a clear one-sided band."
  - "Not a maze solver and not a search planner; the validity layer only selects among proposals."
  - "Research / demonstration model. Do not deploy on hardware."

license:
  model: Apache-2.0
  data: Apache-2.0                  # procedurally generated by this repo
  code: Apache-2.0

checksum:
  algorithm: sha256
  value: "d38d6655c6a86988ff4c871500a7b0f4d9cfd49d944a96abb2ed88bb0960c148"
  artifact: costmap_flow.onnx

reproduce:
  command: "PYTHONPATH=../../nav2_diffusion_training CUDA_VISIBLE_DEVICES= python3 export.py"
  toolchain: "torch 2.10.0+cu128, onnx 1.21.0 (export); CPU"
  hyperparameters: "240 samples, 700 epochs, lr 0.01, 4 flow steps"
  seed: 0
