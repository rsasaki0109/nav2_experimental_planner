# Manifest for the curated generative Mode B (global path) *recurrent* planner.
# Schema mirrors nav2_diffusion_models/manifests/example_diffusion_local.yaml
# (docs/architecture.md section 5.4). Reproduce the artifact with export.py.

model_name: diffusion_global_costmap_recurrent_v0
model_family: recurrent             # GRU autoregressive rollout (H sequential steps)

# Conditioning the model consumes (Mode B PathModel ONNX contract).
input_modalities:
  - local_costmap                  # goal-aligned 24x24 patch, normalized [0,1]
  - local_goal                     # goal distance in the goal-aligned frame

output_type: path_candidates       # K start->goal global path proposals
frame_convention: map              # candidates rotated back into the map frame by the C++ backend
horizon: n/a                       # global path, not a timed trajectory
robot_kinematics: generic          # geometric paths; no kinodynamic assumptions

io_contract:
  inputs:
    context: [1, 2]
    costmap: [1, 1, 24, 24]
  output:
    paths: [1, 5, 12, 2]
  patch_window:
    forward_m: 6.0
    half_width_m: 3.0

runtime: onnx
precision: fp32

architecture:
  type: recurrent_rollout
  note: >
    A 16-d CNN embedding of the 24x24 goal-aligned patch is concatenated with the
    goal-distance context into a GRU conditioning vector. K=5 learned seed vectors
    give each candidate a distinct initial state; a single GRUCell + linear head then
    emits each path one waypoint at a time, feeding the previous point back in, for
    PATH_H=12 sequential steps. Static H/K python loops unroll into an ONNX-clean
    graph (no custom ops). Conditioning on a CNN embedding (like the flow Mode B
    model, NOT the transformer's token attention) means it picks the free side of a
    one-sided obstacle but does not localize an off-centre gap.

training_data:
  datasets:
    - name: synthetic_one_sided_obstacle
      source: sim                  # procedural: one-sided obstacle, expert bows to the open side
      fraction: 1.0
  robot_types:
    - generic
  notes: >
    Fully synthetic ('side' dataset). make_costmap_path_dataset() places a one-sided
    obstacle ahead and the expert path bows to the open side; mirrored +y/-y pairs +
    clear (straight-line) anchors. The K candidates are trained as a small lateral fan
    around the expert so the footprint validator gets a spread of options. NO
    real-robot or rosbag data.

# Behavioural check, not the full Nav2 benchmark suite (research placeholder).
benchmark_results:
  passed: true
  suite: behavioural (nav2_diffusion_onnx end-to-end path direction test)
  costmap_side_selection: true     # one-sided obstacle -> candidates veer to the free side
  off_centre_slot_aiming: false    # CNN embedding cannot localize an off-centre gap (transformer can)
  planner_benchmark_peer_of_flow: true   # clears clear + side obstacle (same as flow Mode B)
  passes_footprint_validated_gap: false  # off-centre gap: still no valid path (hybrid solves it)
  note: >
    A third Mode B family sharing the PathModel contract with the flow and transformer
    siblings, distinguished by a sequential (GRU rollout) inductive bias rather than
    iterative denoising or one-shot set decode. On behaviour it is a PEER of the flow
    Mode B model: it picks the free side of a one-sided obstacle and bows every
    candidate away from it. It does NOT aim at an off-centre slot — that needs the
    transformer's attention over explicit costmap tokens; the gap-routing ceiling
    (docs/generative_limits.md) is unchanged. The hybrid planner remains the
    completeness guarantee for the gap.
  collision_count: 0               # deterministic validity layer gates all output

limitations:
  - "Synthetic training data only — NOT validated on any real robot or rosbag."
  - "Picks the free side of a one-sided obstacle; does NOT localize / route through an off-centre gap (CNN-embedding ceiling, same as flow; transformer aims, hybrid threads)."
  - "Autoregressive rollout costs H=12 sequential steps — highest inference latency of the Mode B families (flow 4, transformer 1)."
  - "Research / demonstration model. Do not deploy on hardware; the validity layer is the authority."

license:
  model: Apache-2.0
  data: Apache-2.0                  # procedurally generated by this repo
  code: Apache-2.0

checksum:
  algorithm: sha256
  value: "7fdedc265ed55041d1dcefc9ea4a7885f3dc017eb0813777b083622c6b478ece"
  artifact: costmap_recurrent.onnx

reproduce:
  command: "PYTHONPATH=../../generative/nav2_diffusion_training python3 export.py  # GPU if available; CUDA_VISIBLE_DEVICES= forces CPU"
  toolchain: "torch 2.10.0+cu128, onnx 1.21.0; trained on CUDA, exported on CPU"
  hyperparameters: "recurrent, dataset 'side' (one-sided obstacle), 240 samples, 2000 epochs, lr 0.01"
  seed: 0
