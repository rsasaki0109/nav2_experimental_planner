# Manifest for the curated generative Mode B (global path) *transformer* planner.
# Schema mirrors nav2_diffusion_models/manifests/example_diffusion_local.yaml
# (docs/architecture.md section 5.4). Reproduce the artifact with export.py.

model_name: diffusion_global_costmap_transformer_v0
model_family: transformer          # DETR-style set prediction (1 deterministic forward)

# Conditioning the model consumes (Mode B PathModel ONNX contract).
input_modalities:
  - local_costmap                  # goal-aligned 24x24 patch, normalized [0,1]
  - local_goal                     # goal distance in the goal-aligned frame

output_type: path_candidates       # K start->goal global path proposals
frame_convention: map              # candidates rotated back into the map frame by the C++ backend
horizon: n/a                       # global path, not a timed trajectory
robot_kinematics: generic          # geometric paths; no kinodynamic assumptions

io_contract:
  inputs:
    context: [1, 2]
    costmap: [1, 1, 24, 24]
  output:
    paths: [1, 5, 12, 2]
  patch_window:
    forward_m: 6.0
    half_width_m: 3.0

runtime: onnx
precision: fp32

architecture:
  type: transformer_set_prediction
  note: >
    A strided conv tokenizes the 24x24 goal-aligned patch into spatial tokens (with
    learned positional embeddings); a context token is prepended. K=5 learned query
    tokens cross-attend to that memory through 2 multi-head decoder blocks and each
    decodes a full start->goal path. Attention over explicit costmap tokens — not a
    16-d CNN embedding — is what lets it localize and route through an off-centre gap.

training_data:
  datasets:
    - name: synthetic_one_sided_obstacle_plus_gap
      source: sim                  # procedural: side obstacle + off-centre-slot routing experts
      fraction: 1.0
  robot_types:
    - generic
  notes: >
    Fully synthetic ('both' dataset). make_costmap_path_dataset() places a one-sided
    obstacle (expert bows to the open side) and make_costmap_path_gap_dataset() places
    a wall with a single off-centre slot (expert routes through the slot: detour to the
    slot offset at the wall, then to the goal). Mirrored +y/-y pairs + clear samples.
    NO real-robot or rosbag data.

# Behavioural check, not the full Nav2 benchmark suite (research placeholder).
benchmark_results:
  passed: true
  suite: behavioural (nav2_diffusion_onnx end-to-end path direction test)
  costmap_side_selection: true     # one-sided obstacle -> candidates veer to the free side
  off_centre_slot_aiming: true     # wall+slot at +/-2 m -> candidates' lateral at the wall ~= slot offset
  passes_footprint_validated_gap: true   # off-centre gap: a valid generative path threads the 1 m slot
  passes_far_off_centre_gap: true  # off-centre slot with the wall pushed ~3 m forward also threads
  exceeds_flow_and_recurrent_off_axis: true  # flow / recurrent (16-d CNN embedding) report no path on off-centre gaps
  misses_centred_on_line_gap: true # TRADE-OFF: over-aimed model fails centred/narrow dead-ahead gaps that flow/recurrent thread
  note: >
    On the footprint-validated planner_benchmark (8 courses) this model THREADS the
    off-centre gap as a pure-generative planner — the first Mode B model here to do so
    without a classical fallback — AND the far off-centre gap (wall pushed ~3 m forward),
    plus 'clear', 'side obstacle', and the on-line 'double gate', where the flow and
    recurrent Mode B models report no path on the off-axis gaps. Two ingredients combine:
    (1) attention over explicit costmap tokens lets it AIM proposals at the off-centre
    slot (the flow / recurrent 16-d CNN embedding cannot); (2) a differentiable
    footprint-clearance loss (FOOTPRINT / BLUR_SIGMA in export.py) optimizes the proposals
    to be what the validity layer accepts, pulling each candidate's wall crossing into the
    free slot with margin so the validator keeps a survivor. HONEST TRADE-OFF surfaced by
    the 8-course sweep: this off-centre specialization is NOT a strict upgrade — the
    over-aimed model reports no path on 'centred gap' / 'narrow gap' (slots dead ahead on
    the straight line) that the flow and recurrent siblings thread trivially; the two
    families are complementary, not ordered. The S-shaped 'slalom' (two staggered walls)
    is still no-path for pure generative; the hybrid planner remains the completeness
    guarantee there. (An earlier claim that gap threading was bounded to wall
    forward-distances near the ~2 m training span is RETRACTED: the far off-centre gap
    threads.) See docs/generative_limits.md.
  collision_count: 0               # deterministic validity layer gates all output

limitations:
  - "Synthetic training data only — NOT validated on any real robot or rosbag."
  - "TRADE-OFF: over-aimed for off-axis slots, so it reports no path on centred/narrow dead-ahead gaps that flow/recurrent thread (the families are complementary)."
  - "Threads the footprint-validated off-centre gap (and far off-centre gap), but the S-shaped slalom (two staggered walls) is still no-path for pure generative (hybrid solves it)."
  - "Off-axis slot aiming / threading demonstrated for offsets up to ~2 m within the 24x24 / 6x6 m patch window; threading holds across wall forward-distance (~2-3 m)."
  - "Research / demonstration model. Do not deploy on hardware; the validity layer is the authority."

