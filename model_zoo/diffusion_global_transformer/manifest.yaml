  value: "d9224283066a08e8ded251667b36556b79f557ef5dbc310e726a6e6e38ddbe6e"
  artifact: costmap_transformer.onnx

reproduce:
  command: "PYTHONPATH=../../generative/nav2_diffusion_training python3 export.py  # GPU if available; CUDA_VISIBLE_DEVICES= forces CPU"
  toolchain: "torch 2.10.0+cu128, onnx 1.21.0; trained on CUDA, exported on CPU"
  hyperparameters: "transformer, dataset 'both' (side + off-centre gap), 240 samples, 2500 epochs, lr 0.01, footprint 3.0, blur_sigma 2.5"
  seed: 0
  note: "GPU training is not bit-exact run-to-run; the committed artifact threads the off-centre gap in the C++ planner_benchmark (verified). A re-export may vary slightly in which candidates thread but reproduces the capability."
